<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lance Knight — Dungeon Crawler</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0806;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Cinzel',serif; color:#e8d5a3; overflow:hidden;
  }
  #game-wrapper { position:relative; display:flex; flex-direction:column; align-items:center; gap:10px; }
  #hud {
    display:flex; align-items:center; justify-content:space-between;
    width:640px; padding:8px 14px;
    background:linear-gradient(135deg,#1a1208,#0f0c05);
    border:2px solid #6b4f1e; border-radius:4px;
    box-shadow:0 0 12px #6b4f1e55,inset 0 0 20px #0005;
  }
  #hearts { display:flex; gap:6px; align-items:center; }
  .heart { font-size:22px; filter:drop-shadow(0 0 4px #cc2222); }
  .heart.empty { filter:grayscale(1) brightness(0.4); }
  #room-label { font-size:13px; letter-spacing:2px; color:#c8a86a; text-transform:uppercase; }
  #hud-right { display:flex; align-items:center; gap:14px; }
  #gold-display { font-size:14px; color:#f5c842; display:flex; align-items:center; gap:5px; }
  #key-display  { font-size:14px; color:#88ddff; display:flex; align-items:center; gap:5px; }
  canvas { display:block; border:3px solid #6b4f1e; box-shadow:0 0 30px #6b4f1e66,0 0 80px #2a1a0844; image-rendering:pixelated; }
  #message-overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:linear-gradient(160deg,#1a1208ee,#0a0806ee);
    border:2px solid #c8a86a; border-radius:6px; padding:30px 50px;
    text-align:center; display:none; flex-direction:column; align-items:center; gap:14px;
    box-shadow:0 0 40px #c8a86a44; min-width:340px; z-index:10;
  }
  #message-overlay.show { display:flex; }
  #message-title { font-size:32px; font-weight:700; color:#f0d070; text-shadow:0 0 20px #f0d07088; }
  #message-body  { font-family:'IM Fell English',serif; font-size:16px; color:#c8a86a; line-height:1.6; }
  #restart-btn {
    margin-top:8px; padding:10px 28px;
    background:linear-gradient(135deg,#6b4f1e,#3d2b0a);
    border:1px solid #c8a86a; border-radius:3px;
    color:#f0d070; font-family:'Cinzel',serif; font-size:14px; letter-spacing:1px;
    cursor:pointer; transition:background .2s,box-shadow .2s;
  }
  #restart-btn:hover { background:linear-gradient(135deg,#8b6f2e,#5d4b1a); box-shadow:0 0 12px #c8a86a66; }
  #controls-hint { font-family:'IM Fell English',serif; font-size:12px; color:#7a6040; letter-spacing:1px; }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div id="hearts"></div>
    <div id="room-label">Chamber I</div>
    <div id="hud-right">
      <div id="key-display" style="display:none">🗝 <span id="key-count">0</span></div>
      <div id="gold-display">⚜ <span id="gold-count">0</span></div>
    </div>
  </div>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div id="controls-hint">WASD / Arrows — Move &nbsp;|&nbsp; Space — Attack &nbsp;|&nbsp; E — Use Door &nbsp;|&nbsp; R — Restart</div>
  <div id="message-overlay">
    <div id="message-title">LANCE KNIGHT</div>
    <div id="message-body">You stand before the dungeon gates.<br>Slay the dungeon lord within.</div>
    <button id="restart-btn">Begin Quest</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 640, H = 480, TILE = 32;

const COL = {
  floor:'#2a1e10', floorAlt:'#251a0e',
  wall:'#1a1005', wallTop:'#3d2c10', wallSide:'#4a3515',
  player:'#c8d4e8', playerArmor:'#6a7a8a', playerDark:'#3a4a5a',
  lance:'#d4c87a', lanceShaft:'#a07840',
  slime:'#3adb4a', bat:'#6644aa',
  soldier:'#cc3333', soldierArmor:'#884422',
  boss:'#cc2200', bossGlow:'#ff4400',
  heart:'#ff3333', gold:'#f5c842',
  keyCol:'#88ddff', lockedDoor:'#441a00', openDoor:'#8b6f2e',
  proj:'#f0e060', dmg:'#ff4444', shadow:'#00000066',
};

let player, projectiles, particles, rooms, currentRoom, gamePhase;
// doorLocked[i] = true means door from room i to room i+1 requires a key
let doorLocked;
const ROOM_NAMES = ['Chamber I','Chamber II','Chamber III','Sanctum of the Lord'];

// ── Safe spawn: finds a tile with no surrounding walls ────
function safePos(walls, avoidX, avoidY) {
  const cols = Math.floor(W/TILE), rows = Math.floor(H/TILE);
  for (let attempt = 0; attempt < 3000; attempt++) {
    const tc = randInt(2, cols-3);
    const tr = randInt(2, rows-3);
    if (walls.has(`${tc},${tr}`)) continue;
    // Ensure none of the 8 neighbours are walls (avoids being clipped into corners)
    let bad = false;
    for (let dc=-1; dc<=1 && !bad; dc++)
      for (let dr=-1; dr<=1 && !bad; dr++)
        if (walls.has(`${tc+dc},${tr+dr}`)) bad = true;
    if (bad) continue;
    const px = tc*TILE+TILE/2, py = tr*TILE+TILE/2;
    if (avoidX !== undefined && Math.hypot(px-avoidX, py-avoidY) < TILE*4) continue;
    return { x:px, y:py };
  }
  return { x:W/2, y:H/2 }; // last-resort fallback
}

// ── Room builder ──────────────────────────────────────────
function buildRooms() {
  doorLocked = [false, false, true, false]; // room2->room3 is locked
  return [
    makeRoom(0,[{type:'slime',count:4},{type:'bat',count:2}],false),
    makeRoom(1,[{type:'slime',count:3},{type:'bat',count:3},{type:'soldier',count:2}],false),
    makeRoom(2,[{type:'soldier',count:4},{type:'bat',count:4},{type:'slime',count:3}],false),
    makeRoom(3,[{type:'boss',count:1}],true),
  ];
}

function makeRoom(idx, enemyDef, isBoss) {
  const cols=Math.floor(W/TILE), rows=Math.floor(H/TILE);
  const walls=new Set();
  for (let c=0;c<cols;c++) { walls.add(`${c},0`); walls.add(`${c},${rows-1}`); }
  for (let r=0;r<rows;r++) { walls.add(`0,${r}`); walls.add(`${cols-1},${r}`); }
  if (!isBoss) {
    [[4,3],[4,10],[15,3],[15,10],[9,6]].forEach(([c,r])=>{
      walls.add(`${c},${r}`);   walls.add(`${c+1},${r}`);
      walls.add(`${c},${r+1}`); walls.add(`${c+1},${r+1}`);
    });
  }
  const enemies = [];
  enemyDef.forEach(({type,count})=>{
    for (let i=0;i<count;i++) enemies.push(makeEnemy(type,walls));
  });
  const treasures = isBoss ? [] : genTreasures(walls, idx);
  // Room 2 always drops a key somewhere
  const keyItem = (idx===2) ? genKeyItem(walls) : null;
  return { idx, walls, enemies, cleared:false, isBoss, treasures, keyItem };
}

function makeEnemy(type, walls) {
  const pos = safePos(walls, W/2, H/2);
  const defs = {
    slime:  {hp:3, maxHp:3, spd:.7, dmg:1, r:10, range:200, score:10},
    bat:    {hp:2, maxHp:2, spd:1.5,dmg:1, r:9,  range:200, score:15},
    soldier:{hp:5, maxHp:5, spd:.9, dmg:1, r:12, range:180, score:25},
    boss:   {hp:30,maxHp:30,spd:1., dmg:2, r:26, range:300, score:200},
  };
  return { type, ...pos, ...defs[type],
    vx:0,vy:0,cooldown:0,phaseTimer:0,knockX:0,knockY:0,alive:true,flickerTime:0 };
}

function genTreasures(walls, idx) {
  const out=[];
  for (let i=0;i<2+idx;i++) {
    const pos=safePos(walls);
    out.push({...pos, collected:false, value:5+randInt(0,10)});
  }
  return out;
}

function genKeyItem(walls) {
  return { ...safePos(walls), collected:false };
}

// ── Player ────────────────────────────────────────────────
function makePlayer() {
  return {
    x:W/2, y:H/2, hp:6, maxHp:6, r:12,
    facing:-Math.PI/2,
    attacking:false, attackTimer:0, attackCooldown:0,
    iframes:0, gold:0, keys:0, speed:2.2, alive:true,
  };
}

// ── Input ─────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if (e.code==='KeyR') restartGame();
  if ((e.code==='Space'||e.code==='KeyZ') && gamePhase==='play') { tryAttack(); e.preventDefault(); }
  if ((e.code==='KeyE'||e.code==='Enter') && gamePhase==='play') tryInteractDoor();
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });
document.getElementById('restart-btn').addEventListener('click', ()=>{
  if (gamePhase==='title') startGame(); else restartGame();
});

function init() {
  gamePhase='title';
  player=null;
  showMessage('LANCE KNIGHT','You stand before the dungeon gates.<br>Slay the dungeon lord within.','Begin Quest');
}

function startGame() {
  gamePhase='play';
  rooms = buildRooms();
  currentRoom = 0;

  player = makePlayer();

  // FIX: safe spawn in first room
  const sp = safePos(rooms[0].walls);
  player.x = sp.x;
  player.y = sp.y;

  projectiles=[]; particles=[];
  hideMessage(); updateHUD();
  requestAnimationFrame(loop);
}
function restartGame() { hideMessage(); startGame(); }

// ── Loop ──────────────────────────────────────────────────
let lastTime=0;
function loop(ts) {
  const dt=Math.min((ts-lastTime)/16.67,3);
  lastTime=ts;
  if (gamePhase==='play') { update(dt); render(); requestAnimationFrame(loop); }
}

// ── Update ────────────────────────────────────────────────
function update(dt) {
  const room=rooms[currentRoom];
  handleInput(dt);
  updateAttack(dt);
  updateEnemies(dt,room);
  updateProjectiles(dt,room);
  updateParticles(dt);
  collectItems(room);
  checkRoomCleared(room);
  if (player.iframes>0) player.iframes-=dt;
  updateHUD();
}

function handleInput(dt) {
  const p=player;
  let dx=0,dy=0;
  if (keys['ArrowLeft']||keys['KeyA'])  dx-=1;
  if (keys['ArrowRight']||keys['KeyD']) dx+=1;
  if (keys['ArrowUp']||keys['KeyW'])    dy-=1;
  if (keys['ArrowDown']||keys['KeyS'])  dy+=1;
  if (dx||dy) {
    const len=Math.hypot(dx,dy);
    p.facing=Math.atan2(dy,dx);
    dx=dx/len*p.speed*dt;
    dy=dy/len*p.speed*dt;
    const room=rooms[currentRoom];
    if (!wallHit(room.walls,p.x+dx,p.y,p.r*.65)) p.x+=dx;
    if (!wallHit(room.walls,p.x,p.y+dy,p.r*.65)) p.y+=dy;
  }
}

function tryAttack() {
  if (!player.alive||player.attackCooldown>0) return;
  player.attacking=true; player.attackTimer=12; player.attackCooldown=22;
  const room=rooms[currentRoom];
  const lx=player.x+Math.cos(player.facing)*32;
  const ly=player.y+Math.sin(player.facing)*32;
  room.enemies.forEach(e=>{ if (!e.alive) return; if (dist(lx,ly,e.x,e.y)<e.r+24) hitEnemy(e,2); });
  spawnParticles(lx,ly,COL.proj,6,3);
}

function updateAttack(dt) {
  if (player.attackTimer>0) player.attackTimer-=dt; else player.attacking=false;
  if (player.attackCooldown>0) player.attackCooldown-=dt;
}

// ── Door logic ────────────────────────────────────────────
function nearDoorPos() {
  const room=rooms[currentRoom];
  if (!room.cleared||room.isBoss||currentRoom>=rooms.length-1) return false;
  return dist(player.x,player.y, W/2, H-TILE*1.5) < 54;
}

function tryInteractDoor() {
  if (!nearDoorPos()) return;
  const locked=doorLocked[currentRoom];
  if (locked) {
    if (player.keys>0) {
      player.keys--;
      doorLocked[currentRoom]=false;
      spawnParticles(W/2,H-TILE*1.5,COL.keyCol,20,4);
      enterNextRoom();
    } else {
      spawnParticles(W/2,H-TILE*1.5,'#ff4444',10,2);
    }
  } else {
    enterNextRoom();
  }
}

function enterNextRoom() {
  if (currentRoom>=rooms.length-1) return;
  currentRoom++;
  const newRoom=rooms[currentRoom];
  // Place player safely near north side
  const sp=safePos(newRoom.walls, W/2, 0);
  player.x=sp.x; player.y=sp.y;
  projectiles=[]; particles=[];
  updateHUD();
}

// ── Enemy AI ──────────────────────────────────────────────
function updateEnemies(dt,room) {
  const p=player;
  room.enemies.forEach(e=>{
    if (!e.alive) return;
    if (e.flickerTime>0) e.flickerTime-=dt;
    if (e.cooldown>0)    e.cooldown-=dt;
    e.knockX*=.82; e.knockY*=.82;
    if (e.type==='boss') { updateBoss(e,p,dt,room); return; }
    const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy);
    let mx=0,my=0;
    if (e.type==='slime') {
      if (d<200) {mx=dx/d*e.spd*dt;my=dy/d*e.spd*dt;}
      if (d<e.r+p.r+4&&e.cooldown<=0&&p.iframes<=0) {damagePlayer(e.dmg);e.cooldown=60;}
    } else if (e.type==='bat') {
      if (d<e.range) {mx=dx/d*e.spd*dt;my=dy/d*e.spd*dt;}
      mx+=Math.sin(Date.now()*.005+e.x)*.4*dt;
      if (d<e.r+p.r+4&&e.cooldown<=0&&p.iframes<=0) {damagePlayer(e.dmg);e.cooldown=50;}
    } else if (e.type==='soldier') {
      if (d<e.range) {mx=dx/d*e.spd*.5*dt;my=dy/d*e.spd*.5*dt;}
      if (d<e.range&&e.cooldown<=0) {
        const a=Math.atan2(dy,dx);
        projectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,owner:'enemy',dmg:1,r:4,life:120});
        e.cooldown=90+randInt(0,40);
      }
    }
    const nx=e.x+mx+e.knockX,ny=e.y+my+e.knockY;
    if (!wallHit(room.walls,nx,e.y,e.r*.6)) e.x=nx;
    if (!wallHit(room.walls,e.x,ny,e.r*.6)) e.y=ny;
  });
}

function updateBoss(e,p,dt,room) {
  const dx=p.x-e.x,dy=p.y-e.y,d=Math.hypot(dx,dy);
  const ph=e.hp/e.maxHp>.6?0:e.hp/e.maxHp>.3?1:2;
  const spd=[.8,1.2,1.8][ph]*dt;
  if (d>e.r+20) {
    const nx=e.x+(dx/d)*spd+e.knockX,ny=e.y+(dy/d)*spd+e.knockY;
    if (!wallHit(room.walls,nx,e.y,e.r*.6)) e.x=nx;
    if (!wallHit(room.walls,e.x,ny,e.r*.6)) e.y=ny;
  }
  e.knockX*=.85;e.knockY*=.85;
  if (e.cooldown<=0) {
    const shots=[1,3,5][ph];
    for (let i=0;i<shots;i++) {
      const a=Math.atan2(dy,dx)+(i-(shots-1)/2)*.35;
      projectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,owner:'enemy',dmg:e.dmg,r:6,life:180,boss:true});
    }
    e.cooldown=70-ph*15;
  }
  if (e.cooldown>0) e.cooldown-=dt;
  if (d<e.r+p.r+6&&p.iframes<=0) damagePlayer(e.dmg);
}

function hitEnemy(e,dmg) {
  e.hp-=dmg; e.flickerTime=10;
  const a=Math.atan2(e.y-player.y,e.x-player.x);
  e.knockX=Math.cos(a)*5;e.knockY=Math.sin(a)*5;
  spawnParticles(e.x,e.y,COL.dmg,5,2.5);
  if (e.hp<=0){e.alive=false;spawnParticles(e.x,e.y,e.type==='boss'?COL.boss:'#fff',18,4);}
}

function updateProjectiles(dt,room) {
  for (let i=projectiles.length-1;i>=0;i--) {
    const pr=projectiles[i];
    pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;
    if (pr.life<=0||wallHit(room.walls,pr.x,pr.y,pr.r)) {
      spawnParticles(pr.x,pr.y,COL.proj,3,1.5);projectiles.splice(i,1);continue;
    }
    if (pr.owner==='enemy'&&dist(pr.x,pr.y,player.x,player.y)<player.r+pr.r) {
      if (player.iframes<=0){damagePlayer(pr.dmg);spawnParticles(player.x,player.y,COL.dmg,6,2);}
      projectiles.splice(i,1);
    }
  }
}

function updateParticles(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vy+=.05*dt;
    if (p.life<=0) particles.splice(i,1);
  }
}

function collectItems(room) {
  room.treasures.forEach(t=>{
    if (t.collected) return;
    if (dist(player.x,player.y,t.x,t.y)<player.r+12) {
      t.collected=true;player.gold+=t.value;spawnParticles(t.x,t.y,COL.gold,8,3);
    }
  });
  if (room.keyItem&&!room.keyItem.collected) {
    if (dist(player.x,player.y,room.keyItem.x,room.keyItem.y)<player.r+14) {
      room.keyItem.collected=true;player.keys++;
      spawnParticles(room.keyItem.x,room.keyItem.y,COL.keyCol,14,3);
    }
  }
}

function checkRoomCleared(room) {
  if (room.cleared) return;
  if (room.enemies.filter(e=>e.alive).length===0) {
    room.cleared=true;
    if (room.isBoss) {
      gamePhase='win';
      showMessage('⚜ VICTORY ⚜',`The dungeon lord has fallen!<br>Gold collected: ${player.gold}`,'Play Again');
    }
    spawnParticles(W/2,H-TILE*1.5,COL.openDoor,20,4);
  }
}

function damagePlayer(dmg) {
  if (player.iframes>0) return;
  player.hp-=dmg;player.iframes=60;
  spawnParticles(player.x,player.y,COL.heart,8,3);
  if (player.hp<=0) {
    player.alive=false;gamePhase='dead';
    showMessage('YOU HAVE FALLEN','The dungeon lord remains unchallenged.<br>Your lance grows cold.','Try Again');
  }
}

function spawnParticles(x,y,color,count,speed) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2,s=(.5+Math.random()*.5)*speed;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color,life:20+Math.random()*20,maxLife:40,r:2+Math.random()*2});
  }
}

// ── Render ────────────────────────────────────────────────
function render() {
  const room=rooms[currentRoom];
  ctx.clearRect(0,0,W,H);
  drawFloor(room);
  drawWalls(room);
  drawDoorVisual(room);
  drawTreasures(room);
  drawProjectiles();
  drawEnemies(room);
  drawParticles();
  if (player.alive) drawPlayer();
  drawAttackArc();
  drawDoorPrompt(room);
}

function drawFloor(room) {
  const cols=Math.floor(W/TILE),rows=Math.floor(H/TILE);
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    if (room.walls.has(`${c},${r}`)) continue;
    ctx.fillStyle=(c+r)%2===0?COL.floor:COL.floorAlt;
    ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
  }
}

function drawWalls(room) {
  room.walls.forEach(key=>{
    const [c,r]=key.split(',').map(Number);
    ctx.fillStyle=COL.wall;    ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
    ctx.fillStyle=COL.wallTop; ctx.fillRect(c*TILE,r*TILE,TILE,6);
    ctx.fillStyle=COL.wallSide;ctx.fillRect(c*TILE,r*TILE+6,4,TILE-6);
    ctx.strokeStyle='#0f0a04';ctx.lineWidth=.5;
    ctx.strokeRect(c*TILE+.5,r*TILE+.5,TILE-1,TILE-1);
  });
}

function drawDoorVisual(room) {
  if (!room.cleared||room.isBoss||currentRoom>=rooms.length-1) return;
  const dx=W/2-TILE/2, dy=H-TILE*2;
  const locked=doorLocked[currentRoom];
  // Frame
  ctx.fillStyle=locked?'#3a1500':'#5a3a10';
  ctx.fillRect(dx-2,dy,TILE+4,TILE*2);
  // Fill
  ctx.fillStyle=locked?'#200900':'#7a5520';
  ctx.fillRect(dx+3,dy+3,TILE-6,TILE*2-3);
  // Planks
  ctx.strokeStyle=locked?'#3a1200':'#5a3a10';ctx.lineWidth=2;
  for (let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(dx+3,dy+3+i*14);ctx.lineTo(dx+TILE-3,dy+3+i*14);ctx.stroke();}
  // Lock or open arch glow
  if (locked) {
    // Padlock body
    ctx.fillStyle='#f5c842';
    ctx.fillRect(W/2-6,dy+TILE-2,12,9);
    ctx.beginPath();ctx.arc(W/2,dy+TILE-2,6,Math.PI,0);ctx.fill();
    ctx.fillStyle='#1a0a00';
    ctx.beginPath();ctx.arc(W/2,dy+TILE-2,3,Math.PI,0);ctx.fill();
    ctx.fillRect(W/2-1,dy+TILE+2,2,4);
  } else {
    const grd=ctx.createRadialGradient(W/2,H-TILE,5,W/2,H-TILE,42);
    grd.addColorStop(0,'#c8a86a55');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(dx-30,dy-10,TILE+60,TILE*2+20);
  }
  // Arch top
  ctx.fillStyle=locked?'#3a1500':'#5a3a10';
  ctx.beginPath();ctx.arc(W/2,dy,TILE/2+2,Math.PI,0);ctx.fill();
}

function drawDoorPrompt(room) {
  if (!nearDoorPos()) return;
  const locked=doorLocked[currentRoom];
  ctx.fillStyle='#f0d070cc';ctx.font='13px Cinzel,serif';ctx.textAlign='center';
  if (locked)
    ctx.fillText(player.keys>0?'Press E — Use Key 🗝':'Need a Key 🗝',W/2,H-TILE*2-14);
  else
    ctx.fillText('Press E to advance',W/2,H-TILE*2-14);
}

function drawTreasures(room) {
  room.treasures.forEach(t=>{
    if (t.collected) return;
    const bob=Math.sin(Date.now()*.003+t.x)*3;
    const grd=ctx.createRadialGradient(t.x,t.y+bob,2,t.x,t.y+bob,14);
    grd.addColorStop(0,'#f5c84288');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(t.x,t.y+bob,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=COL.gold;ctx.beginPath();ctx.arc(t.x,t.y+bob,7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#aa8800';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#aa8800';ctx.font='bold 9px serif';ctx.textAlign='center';
    ctx.fillText('G',t.x,t.y+bob+3);
  });
  if (room.keyItem&&!room.keyItem.collected) {
    const k=room.keyItem;
    const bob=Math.sin(Date.now()*.003+k.x)*3;
    const grd=ctx.createRadialGradient(k.x,k.y+bob,2,k.x,k.y+bob,18);
    grd.addColorStop(0,'#88ddff55');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(k.x,k.y+bob,18,0,Math.PI*2);ctx.fill();
    // Draw key
    ctx.save();ctx.translate(k.x,k.y+bob);ctx.rotate(Math.PI/4);
    ctx.fillStyle=COL.keyCol;
    ctx.beginPath();ctx.arc(0,-8,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#336677';ctx.beginPath();ctx.arc(0,-8,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=COL.keyCol;ctx.fillRect(-2,-2,4,14);
    ctx.fillRect(1,3,4,2);ctx.fillRect(1,7,3,2);
    ctx.restore();
  }
}

function drawProjectiles() {
  projectiles.forEach(pr=>{
    const c=pr.boss?COL.boss:COL.proj;
    const grd=ctx.createRadialGradient(pr.x,pr.y,0,pr.x,pr.y,pr.r*2);
    grd.addColorStop(0,c);grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r*2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r,0,Math.PI*2);ctx.fill();
  });
}

function drawEnemies(room) {
  room.enemies.forEach(e=>{
    if (!e.alive) return;
    if (e.flickerTime>0&&Math.floor(e.flickerTime)%3===0) return;
    if (e.type==='slime')   drawSlime(e);
    else if (e.type==='bat') drawBat(e);
    else if (e.type==='soldier') drawSoldier(e);
    else if (e.type==='boss')    drawBoss(e);
    drawHealthBar(e);
  });
}

// ── Knight — upright top-down sprite ─────────────────────
// Local space: y-up = forward, so the lance points toward negative y.
// We rotate by (facing + PI/2) so the knight always faces the direction of movement.
function drawPlayer() {
  const p=player;
  if (p.iframes>0&&Math.floor(p.iframes/4)%2===0) return;
  ctx.save();
  ctx.translate(p.x,p.y);
  // Ground shadow (unrotated)
  ctx.fillStyle=COL.shadow;
  ctx.beginPath();ctx.ellipse(0,12,11,5,0,0,Math.PI*2);ctx.fill();
  //ctx.rotate(p.facing+Math.PI/2);

  // ── Feet / boots ─────────────────────────────────────
  ctx.fillStyle='#2a3040';
  ctx.fillRect(-6,14,5,7);   // left boot
  ctx.fillRect(1,14,5,7);    // right boot

  // ── Greaves (lower leg armour) ────────────────────────
  ctx.fillStyle=COL.playerDark;
  ctx.fillRect(-6,8,5,8);
  ctx.fillRect(1,8,5,8);

  // ── Thighs ────────────────────────────────────────────
  ctx.fillStyle=COL.playerArmor;
  ctx.fillRect(-6,2,5,8);
  ctx.fillRect(1,2,5,8);

  // ── Tassets (hip skirt plates) ────────────────────────
  ctx.fillStyle=COL.playerDark;
  ctx.fillRect(-8,2,4,6);
  ctx.fillRect(4,2,4,6);

  // ── Torso / breastplate ───────────────────────────────
  ctx.fillStyle=COL.playerArmor;
  ctx.fillRect(-8,-10,16,14);
  // Chest highlight
  ctx.fillStyle=COL.player;
  ctx.fillRect(-5,-9,10,10);
  // Centre ridge
  ctx.fillStyle=COL.playerDark;
  ctx.fillRect(-1,-9,2,10);
  // Collar
  ctx.fillStyle=COL.playerArmor;
  ctx.fillRect(-6,-12,12,4);

  // ── Pauldrons (shoulders) ─────────────────────────────
  ctx.fillStyle=COL.playerDark;
  ctx.beginPath();ctx.ellipse(-10,-7,5,4,-.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10,-7,5,4,.3,0,Math.PI*2);ctx.fill();

  // ── Shield (left side — our screen-right when facing up) ─
  ctx.fillStyle='#5a3a10';
  ctx.beginPath();
  ctx.moveTo(11,-9); ctx.lineTo(18,-5); ctx.lineTo(18,5);
  ctx.lineTo(15,10); ctx.lineTo(11,8);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c8a870';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#c8a870';ctx.beginPath();ctx.arc(14,1,2.5,0,Math.PI*2);ctx.fill();

  // ── Lance (right hand — left side in screen-space when facing up) ─
  const lLen=p.attacking?52:42;
  // Shaft
  ctx.strokeStyle=COL.lanceShaft;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-5,8);ctx.lineTo(-5,-lLen+12);ctx.stroke();
  // Attack glow
  if (p.attacking) {
    ctx.strokeStyle='#f0e06066';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(-5,4);ctx.lineTo(-5,-lLen+12);ctx.stroke();
  }
  // Steel tip (leaf-shaped)
  ctx.fillStyle='#dde8f8';
  ctx.beginPath();
  ctx.moveTo(-5,-lLen+12);
  ctx.lineTo(-9,-lLen+22);
  ctx.lineTo(-5,-lLen);
  ctx.lineTo(-1,-lLen+22);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#aabbcc';ctx.lineWidth=1;ctx.stroke();

  // ── Helmet ────────────────────────────────────────────
  // Neck/gorget
  ctx.fillStyle=COL.playerDark;
  ctx.fillRect(-5,-14,10,5);
  // Dome
  ctx.fillStyle=COL.playerArmor;
  ctx.beginPath();ctx.arc(0,-20,10,Math.PI,0);ctx.closePath();ctx.fill();
  ctx.fillRect(-10,-20,20,7);
  // Visor
  ctx.fillStyle='#1a2030';
  ctx.fillRect(-7,-23,14,6);
  // Eye glow slits
  ctx.fillStyle='#99ccff44';
  ctx.fillRect(-6,-22,5,3);
  ctx.fillRect(1,-22,5,3);
  // Helm crest / ridge
  ctx.fillStyle=COL.player;
  ctx.fillRect(-1,-30,2,13);
  // Plume (small decorative top)
  ctx.fillStyle='#cc3333';
  ctx.beginPath();ctx.ellipse(0,-31,2,4,0,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawAttackArc() {
  if (!player.attacking) return;
  ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.facing);
  const grd=ctx.createRadialGradient(0,0,10,0,0,56);
  grd.addColorStop(0,'#f0e06044');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,56,-.65,.65);ctx.closePath();ctx.fill();
  ctx.restore();
}

// ── Enemy sprites ─────────────────────────────────────────
function drawSlime(e) {
  const b=Math.abs(Math.sin(Date.now()*.004+e.x))*3;
  ctx.save();ctx.translate(e.x,e.y);
  ctx.fillStyle=COL.shadow;ctx.beginPath();ctx.ellipse(0,e.r-2+b,e.r*.9,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=COL.slime;ctx.beginPath();ctx.ellipse(0,-b/2,e.r,e.r+b/2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-4,-3-b/2,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-3-b/2,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#003300';
  ctx.beginPath();ctx.arc(-4,-3-b/2,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-3-b/2,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBat(e) {
  const f=Math.sin(Date.now()*.015+e.x);
  ctx.save();ctx.translate(e.x,e.y);
  ctx.fillStyle=COL.bat;
  ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(-20,-10*f,-22+f*4,4);ctx.quadraticCurveTo(-8,8,0,4);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(20,-10*f,22-f*4,4);ctx.quadraticCurveTo(8,8,0,4);ctx.fill();
  ctx.fillStyle='#8855cc';ctx.beginPath();ctx.ellipse(0,0,7,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff2222';
  ctx.beginPath();ctx.arc(-3,-2,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-2,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawSoldier(e) {
  const angle=Math.atan2(player.y-e.y,player.x-e.x);
  ctx.save();ctx.translate(e.x,e.y);ctx.rotate(angle+Math.PI/2);
  ctx.fillStyle=COL.shadow;ctx.beginPath();ctx.ellipse(0,14,10,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a2010';ctx.fillRect(-5,8,5,9);ctx.fillRect(1,8,5,9);
  ctx.fillStyle=COL.soldierArmor;ctx.fillRect(-8,-8,16,18);
  ctx.fillStyle='#aa2222';ctx.fillRect(-5,-7,10,12);
  ctx.fillStyle=COL.soldierArmor;ctx.fillRect(-1,-7,2,12);
  ctx.fillStyle='#662211';ctx.fillRect(-11,-8,5,8);ctx.fillRect(6,-8,5,8);
  ctx.fillStyle='#bbbbbb';ctx.fillRect(-3,-18,2,18);
  ctx.fillStyle='#cc8833';ctx.fillRect(-6,-6,8,3);
  ctx.fillStyle=COL.soldier;ctx.beginPath();ctx.arc(0,-20,9,Math.PI,0);ctx.closePath();ctx.fill();
  ctx.fillRect(-9,-20,18,6);
  ctx.fillStyle='#1a0a00';ctx.fillRect(-6,-22,12,5);
  ctx.restore();
}

function drawBoss(e) {
  const pulse=Math.sin(Date.now()*.003)*4;
  ctx.save();ctx.translate(e.x,e.y);
  const grd=ctx.createRadialGradient(0,0,e.r-2,0,0,e.r+20+pulse);
  grd.addColorStop(0,COL.bossGlow+'88');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,e.r+20+pulse,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=COL.shadow;ctx.beginPath();ctx.ellipse(0,e.r+4,e.r*.9,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#880000';ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#441111';
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,e.r,a,a+Math.PI/6);ctx.closePath();ctx.fill();}
  ctx.fillStyle='#f0d070';
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*10-4,-e.r+2);ctx.lineTo(i*10,-e.r-10-Math.abs(i)*4);ctx.lineTo(i*10+4,-e.r+2);ctx.fill();}
  ctx.fillRect(-14,-e.r+2,28,8);
  ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(-9,-4,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(9,-4,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-9,-4,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(9,-4,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawHealthBar(e) {
  if (e.type==='boss') {
    const bw=300,bh=14,bx=W/2-150,by=8;
    ctx.fillStyle='#1a0a00';ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.maxHp,col=pct>.6?'#cc3300':pct>.3?'#ff6600':'#ff0000';
    ctx.fillStyle=col;ctx.fillRect(bx,by,bw*pct,bh);
    ctx.strokeStyle='#f0d070';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='#f0d070';ctx.font='10px Cinzel,serif';ctx.textAlign='center';
    ctx.fillText(`DUNGEON LORD  ${e.hp}/${e.maxHp}`,W/2,by+bh-2);
    return;
  }
  const bw=e.r*2,bh=3,bx=e.x-e.r,by=e.y-e.r-7;
  ctx.fillStyle='#1a0a00';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=e.hp/e.maxHp>.5?'#33dd33':'#ee4411';
  ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── HUD ───────────────────────────────────────────────────
function updateHUD() {
  if (!player) return;
  const hc=document.getElementById('hearts');
  hc.innerHTML='';
  for (let i=0;i<player.maxHp/2;i++) {
    const h=document.createElement('span');
    h.className='heart'+(i*2<player.hp?'':' empty');
    h.textContent='♥';hc.appendChild(h);
  }
  document.getElementById('gold-count').textContent=player.gold;
  document.getElementById('room-label').textContent=ROOM_NAMES[currentRoom]||'Chamber';
  const kd=document.getElementById('key-display');
  document.getElementById('key-count').textContent=player.keys;
  kd.style.display=player.keys>0?'flex':'none';
}

function showMessage(title,body,btn) {
  document.getElementById('message-title').textContent=title;
  document.getElementById('message-body').innerHTML=body;
  document.getElementById('restart-btn').textContent=btn;
  document.getElementById('message-overlay').classList.add('show');
}
function hideMessage(){ document.getElementById('message-overlay').classList.remove('show'); }

// ── Utils ─────────────────────────────────────────────────
function wallHit(walls,x,y,r) {
  r=r||1;
  return isWall(walls,x-r,y)||isWall(walls,x+r,y)||
         isWall(walls,x,y-r)||isWall(walls,x,y+r);
}
function isWall(walls,x,y) { return walls.has(`${Math.floor(x/TILE)},${Math.floor(y/TILE)}`); }
function dist(ax,ay,bx,by) { return Math.hypot(bx-ax,by-ay); }
function randInt(a,b) { return a+Math.floor(Math.random()*(b-a+1)); }

// ── Boot ──────────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
